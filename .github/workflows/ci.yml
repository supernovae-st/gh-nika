name: ci
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: shellcheck
        run: shellcheck gh-nika

      - name: shfmt (diff = fail)
        run: |
          curl -fsSL -o /usr/local/bin/shfmt \
            https://github.com/mvdan/sh/releases/download/v3.10.0/shfmt_v3.10.0_linux_amd64
          chmod +x /usr/local/bin/shfmt
          shfmt -d -i 2 -ci -bn gh-nika

      - name: smoke · pass-through lane (a PATH nika wins, argv intact)
        run: |
          mkdir -p /tmp/fakebin
          printf '#!/usr/bin/env bash\necho "FAKE argv: $*"\n' > /tmp/fakebin/nika
          chmod +x /tmp/fakebin/nika
          out="$(PATH="/tmp/fakebin:$PATH" ./gh-nika check flow.nika.yaml --json)"
          echo "$out"
          test "$out" = "FAKE argv: check flow.nika.yaml --json"

      - name: smoke · download lane (checksum-verified fetch, real release)
        env:
          GH_TOKEN: ${{ github.token }}
          GH_NIKA_DIR: /tmp/gh-nika-cache
        run: |
          ./gh-nika --version
          test -x /tmp/gh-nika-cache/nika

      - name: smoke · refresh flag re-fetches
        env:
          GH_TOKEN: ${{ github.token }}
          GH_NIKA_DIR: /tmp/gh-nika-cache
          GH_NIKA_REFRESH: "1"
        run: ./gh-nika --version
